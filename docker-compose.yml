services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      VAPI_KEY: ${VAPI_KEY:-}
      VAPI_PRIVATE_KEY: ${VAPI_PRIVATE_KEY:-}
      VAPI_PUBLIC_KEY: ${VAPI_PUBLIC_KEY:-}
      VAPI_ASSISTANT_ID: ${VAPI_ASSISTANT_ID:-}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
